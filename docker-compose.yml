services:
  api:
    build: .
    command: node dist/server.js
    ports: ["4600:4600"]
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on: [mysql, redis]
  worker:
    build: .
    command: node dist/worker.js
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on: [mysql, redis]
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_service
      MYSQL_USER: chesa
      MYSQL_PASSWORD: change-me
    ports: ["3307:3306"]
    volumes: [mysql-data:/var/lib/mysql]
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
volumes:
  mysql-data:
